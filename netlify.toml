# Netlify configuration file

[build]
  # Directory to change to before starting a build
  base = "."
  
  # Directory that contains the build output
  publish = "build"
  
  # Build command
  command = "npm run build"

# Redirect all routes to index.html for single page application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (set these in Netlify UI)
# CI = false (to prevent treating warnings as errors during build)
